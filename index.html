<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dharma OS"/>
<meta name="theme-color" content="#0D0A14"/>
<title>🌸 Dharma OS — Usha Ji</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0D0A14;color:#e8dff0;font-family:Georgia,'Times New Roman',serif;overflow-x:hidden;font-size:16px;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.app-container{min-height:100vh;max-width:480px;margin:0 auto;background:#0D0A14;display:flex;flex-direction:column;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:#3a2a4a;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const C = {
  rose: "#D4A0B8", gold: "#E8C48A", purple: "#B89AD4", 
  sub: "#554466", cardBg: "rgba(212,160,184,0.03)", border: "rgba(212,160,184,0.1)"
};

const USHA = {
  name: "Usha Ji", dob: "27-08-1971", rashi: "Vrishabha", nakshatra: "Rohini",
  schedule: [
    {time:"05:30",label:"Gentle Wake",icon:"🌸",detail:"Brahma Muhurta for Rohini natives."},
    {time:"06:00",label:"Puja",icon:"🪔",detail:"15-20 mins. Diya & Prayer."},
    {time:"09:00",label:"Creative Time",icon:"🏠",detail:"Home is your creative kingdom."},
    {time:"12:00",label:"Main Meal",icon:"☀️",detail:"Largest meal of the day."},
    {time:"17:00",label:"Sandhya Walk",icon:"🌅",detail:"Evening walk at dusk."},
    {time:"21:30",label:"Sleep",icon:"🌙",detail:"Protect your sacred rest."}
  ],
  library: [
    {title:"Bhagavad Gita",author:"Gita Press",desc:"Ashtavakra & Shankaracharya Commentary."},
    {title:"Sundarkand",author:"Valmiki/Tulsidas",desc:"For strength and protection."}
  ]
};

const getTodayInfo = () => {
  const n = new Date();
  return {
    timeStr: n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
    day: n.toLocaleTimeString([], {weekday:'long'}),
    date: n.toLocaleDateString([], {day:'numeric', month:'short'})
  };
};

function App() {
  const [tab, setTab] = useState('home');
  const [today, setToday] = useState(getTodayInfo());

  useEffect(() => {
    const t = setInterval(() => setToday(getTodayInfo()), 60000);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="app-container">
      {/* Header */}
      <div style={{padding:"14px 16px", background:"linear-gradient(180deg,rgba(212,160,184,0.08) 0%,transparent 100%)", borderBottom:`1px solid ${C.border}`, position:"sticky", top:0, zIndex:10, backdropFilter:"blur(10px)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:C.rose,fontSize:18,fontWeight:700}}>🌸 Dharma OS</div>
            <div style={{color:C.sub,fontSize:10,letterSpacing:1}}>USHA JI · ROHINI</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:C.gold,fontSize:14,fontWeight:600}}>{today.timeStr}</div>
            <div style={{color:C.sub,fontSize:10}}>{today.day}, {today.date}</div>
          </div>
        </div>
      </div>

      {/* Main Content */}
      <div style={{flex:1, padding:16, overflowY:"auto"}}>
        {tab === 'home' && (
          <div>
            <div style={{background:C.cardBg, border:`1px solid ${C.border}`, padding:20, borderRadius:16, marginBottom:20}}>
              <h2 style={{color:C.gold, fontSize:16, marginBottom:8}}>Daily Guidance</h2>
              <p style={{fontSize:14, lineHeight:1.5, opacity:0.8}}>Focus on the light of the dawn, Usha Ji. Your Rohini nature thrives on steady, beautiful rhythms.</p>
            </div>
            
            <h3 style={{fontSize:12, color:C.sub, letterSpacing:1, marginBottom:12}}>UPCOMING STEPS</h3>
            {USHA.schedule.slice(0, 3).map((item, i) => (
              <div key={i} style={{display:"flex", gap:12, marginBottom:16, background:C.cardBg, padding:12, borderRadius:12}}>
                <span style={{fontSize:20}}>{item.icon}</span>
                <div>
                  <div style={{fontSize:14, fontWeight:600}}>{item.label} <span style={{color:C.rose, fontSize:12, marginLeft:8}}>{item.time}</span></div>
                  <div style={{fontSize:12, opacity:0.6}}>{item.detail}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === 'library' && (
          <div>
            <h2 style={{color:C.gold, fontSize:18, marginBottom:16}}>Svadhyaya (Study)</h2>
            {USHA.library.map((book, i) => (
              <div key={i} style={{marginBottom:12, padding:16, border:`1px solid ${C.border}`, borderRadius:12}}>
                <div style={{color:C.rose, fontWeight:600}}>{book.title}</div>
                <div style={{fontSize:12, color:C.sub}}>{book.author}</div>
                <div style={{fontSize:13, marginTop:4, opacity:0.8}}>{book.desc}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Navigation */}
      <div style={{display:"flex", justifyContent:"space-around", padding:"12px 0", borderTop:`1px solid ${C.border}`, background:"#0D0A14"}}>
        <button onClick={() => setTab('home')} style={{opacity: tab === 'home' ? 1 : 0.4}}>🏠</button>
        <button onClick={() => setTab('library')} style={{opacity: tab === 'library' ? 1 : 0.4}}>📖</button>
        <button onClick={() => setTab('chart')} style={{opacity: tab === 'chart' ? 1 : 0.4}}>☸️</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
