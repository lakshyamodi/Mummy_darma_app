function getTodayInfo(){
  const now=new Date();
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const day=days[now.getDay()];
  const isGoodDay=USHA.panchang.goodDays.some(d=>d.startsWith(day));
  const isChallenging=USHA.panchang.challengingDays.some(d=>d.startsWith(day));
  const lunarCycle=29.53;
  const knownNewMoon=new Date("2024-01-11");
  const daysSince=(now-knownNewMoon)/(1000*60*60*24);
  const lunarAge=((daysSince%lunarCycle)+lunarCycle)%lunarCycle;
  const tithi=Math.floor(lunarAge/(lunarCycle/30))+1;
  const paksha=tithi<=15?"Shukla Paksha":"Krishna Paksha";
  const tithiNum=tithi<=15?tithi:tithi-15;
  const tithiNames=["","Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi","Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima/Amavasya"];
  const tithiName=tithiNames[Math.min(tithiNum,15)];
  const isEkadashi=tithiNum===11;
  const isPurnima=tithiNum===15&&paksha==="Shukla Paksha";
  const isAmavasya=tithiNum===15&&paksha==="Krishna Paksha";
  const wordIndex=(now.getDate()+now.getMonth())%USHA.sanskritWord.length;
  return{date:`${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`,day,isGoodDay,isChallenging,paksha,tithiName,tithiNum,isEkadashi,isPurnima,isAmavasya,lunarAge:Math.floor(lunarAge),wordOfDay:USHA.sanskritWord[wordIndex],hour:now.getHours(),minute:now.getMinutes(),timeStr:now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})};
}

function getGreeting(hour,day){
  if(hour>=4&&hour<6)return{greeting:"Brahma Muhurta",sub:"Sacred dawn. The world is quiet. Light the diya and breathe.",icon:"🌌"};
  if(hour>=6&&hour<9)return{greeting:"Pranam, Usha Ji 🙏",sub:`Good ${day} morning. Rohini's grace is with you today.`,icon:"🌸"};
  if(hour>=9&&hour<12)return{greeting:"Shubh Prahar",sub:"Morning hours — creative, home, devotional time. Venus in 4th is happy.",icon:"🏠"};
  if(hour>=12&&hour<14)return{greeting:"Madhyahna",sub:"Midday — your largest meal now. Sit, eat peacefully. This is self-care.",icon:"☀️"};
  if(hour>=14&&hour<17)return{greeting:"Vishram Kaal",sub:"Afternoon rest is medicine for your constitution. Rest without guilt.",icon:"🌿"};
  if(hour>=17&&hour<20)return{greeting:"Sandhya Kaal 🪔",sub:"Sacred junction. Light the diya. Evening walk if possible.",icon:"🌅"};
  if(hour>=20&&hour<21)return{greeting:"Parivar Kaal",sub:"Family time. Rohini's deepest nourishment — conversation, warmth, connection.",icon:"👨‍👩‍👧"};
  if(hour>=21&&hour<22)return{greeting:"Vishram Prahar",sub:"Winding down. Warm milk with saffron. Spiritual reading. Peace.",icon:"📿"};
  return{greeting:"Shubh Ratri, Usha Ji",sub:"Rohini Moon needs full rest. The home is peaceful. Sleep is sacred.",icon:"🌙"};
}

function getCurrentItem(hour,minute){
  const cur=hour*60+minute;
  for(let i=USHA.schedule.length-1;i>=0;i--){
    const[h,m]=USHA.schedule[i].time.split(":").map(Number);
    if(cur>=h*60+m)return USHA.schedule[i];
  }
  return USHA.schedule[USHA.schedule.length-1];
}

function useStorage(key,def){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}});
  const set=useCallback((v)=>{const n=typeof v==='function'?v(val):v;setVal(n);try{localStorage.setItem(key,JSON.stringify(n));}catch{}},[key,val]);
  return[val,set];
}

// ── SCHEDULE ──────────────────────────────────────────────────────────────
function Schedule({today}){
  const cats=["morning","work","afternoon","evening"];
  const cL={morning:"🌅 Subah",work:"🏠 Din",afternoon:"☀️ Dopahar",evening:"🌙 Shaam"};
  const cur=today.hour*60+today.minute;
  return(
    <div>
      <div style={{...C.cardGlow,textAlign:"center",padding:14}}>
        <div style={{color:C.gold,fontSize:13,fontWeight:700}}>Aapka Dainik Raga</div>
        <div style={{color:C.sub,fontSize:11,marginTop:4}}>Rohini · Mithuna Lagna · Shukra in 4th</div>
      </div>
      {cats.map(cat=>(
        <div key={cat}>
          <div style={{color:"#554466",fontSize:10,letterSpacing:1,padding:"8px 4px 4px"}}>{cL[cat]}</div>
          {USHA.schedule.filter(s=>s.category===cat).map((s,i)=>{
            const[h,m]=s.time.split(":").map(Number);
            const mins=h*60+m;
            const isNow=cur>=mins&&cur<mins+90;
            const isPast=cur>mins+90;
            return(
              <div key={i} style={{...C.card,padding:"12px 14px",marginBottom:8,borderColor:isNow?"rgba(212,160,184,0.5)":"rgba(255,255,255,0.06)",background:isNow?"rgba(212,160,184,0.07)":isPast?"rgba(255,255,255,0.01)":"rgba(255,255,255,0.03)"}}>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:22,opacity:isPast?0.3:1}}>{s.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:isNow?C.rose:isPast?"#443355":"#d0c0e0",fontSize:13,fontWeight:isNow?700:400}}>{s.label}</span>
                      <span style={{color:isNow?C.rose:"#443355",fontSize:11}}>{s.time}</span>
                    </div>
                    <div style={{color:isPast?"#443355":C.sub,fontSize:11,marginTop:3,lineHeight:1.5}}>{s.detail}</div>
                    {isNow&&<div style={{marginTop:6}}><Badge color={C.rose}>ABHI</Badge></div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── TASKS / SANKALPA ──────────────────────────────────────────────────────
function Tasks(){
  const[tasks,setTasks]=useStorage("usha_tasks",[]);
  const[prayers,setPrayers]=useStorage("usha_prayers",[]);
  const[sankalpa,setSankalpa]=useStorage(`usha_s_${new Date().toISOString().split("T")[0]}`,"");
  const[newT,setNewT]=useState("");
  const[newP,setNewP]=useState("");
  const today=new Date().toISOString().split("T")[0];
  const addT=()=>{if(!newT.trim())return;setTasks(t=>[...t,{id:Date.now(),text:newT,done:false,date:today}]);setNewT("");};
  const addP=()=>{if(!newP.trim())return;setPrayers(p=>[...p,{id:Date.now(),text:newP,done:false}]);setNewP("");};
  return(
    <div>
      <div style={{...C.cardGlow,borderColor:"rgba(232,196,138,0.3)"}}>
        <div style={{color:C.gold,fontSize:10,letterSpacing:1,marginBottom:8}}>🌸 AAJ KA SANKALPA</div>
        <div style={{color:C.sub,fontSize:11,marginBottom:8}}>Ek kaam jo aaj zaroor hoga — Brahma ke saamne vachan.</div>
        <input value={sankalpa} onChange={e=>setSankalpa(e.target.value)} placeholder="Aaj ka ek sankalpa likho..." style={{width:"100%",background:"rgba(232,196,138,0.05)",border:"1px solid rgba(232,196,138,0.2)",borderRadius:10,color:C.gold,fontSize:14,padding:"10px 12px",fontFamily:"inherit",boxSizing:"border-box",fontWeight:600}}/>
        {sankalpa&&<div style={{marginTop:8}}><Badge color={C.gold}>Sankalpa liya 🙏</Badge></div>}
      </div>

      <div style={C.card}>
        <STitle icon="📋" title="Kaam Ki Suchi"/>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newT} onChange={e=>setNewT(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addT()} placeholder="Koi kaam add karein..." style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:10,color:"#d0c0e0",fontSize:13,padding:"9px 12px",fontFamily:"inherit"}}/>
          <button onClick={addT} style={{padding:"9px 14px",background:"rgba(232,196,138,0.12)",border:"1px solid rgba(232,196,138,0.25)",borderRadius:10,color:C.gold,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Add</button>
        </div>
        {tasks.filter(t=>!t.done).slice(-15).reverse().map(t=>(
          <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
            <div onClick={()=>setTasks(ts=>ts.map(x=>x.id===t.id?{...x,done:!x.done}:x))} style={{width:22,height:22,borderRadius:6,border:`2px solid ${t.done?C.green:"#443355"}`,background:t.done?C.green:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {t.done&&<span style={{color:"#000",fontSize:11,fontWeight:700}}>✓</span>}
            </div>
            <span style={{flex:1,color:"#d0c0e0",fontSize:13}}>{t.text}</span>
            <button onClick={()=>setTasks(ts=>ts.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:"#443355",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
        ))}
        {tasks.filter(t=>!t.done).length===0&&<div style={{color:"#443355",fontSize:12,textAlign:"center",padding:16}}>Koi kaam nahi — Rohini ki shakti aaj mukt hai 🌸</div>}
      </div>

      <div style={C.card}>
        <STitle icon="🙏" title="Mannat / Prarthana" sub="Jo maanga hai, jo dil mein hai — yahan likhein."/>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newP} onChange={e=>setNewP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addP()} placeholder="Prarthana likho..." style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:10,color:"#d0c0e0",fontSize:13,padding:"9px 12px",fontFamily:"inherit"}}/>
          <button onClick={addP} style={{padding:"9px 14px",background:"rgba(184,154,212,0.12)",border:"1px solid rgba(184,154,212,0.25)",borderRadius:10,color:C.purple,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🙏</button>
        </div>
        {prayers.map(p=>(
          <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
            <div onClick={()=>setPrayers(ps=>ps.map(x=>x.id===p.id?{...x,done:!x.done}:x))} style={{width:22,height:22,borderRadius:6,border:`2px solid ${p.done?C.green:"#443355"}`,background:p.done?C.green:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {p.done?<span style={{color:"#000",fontSize:11}}>🙏</span>:<span style={{color:"#665577",fontSize:10}}>○</span>}
            </div>
            <span style={{flex:1,color:p.done?"#665577":"#d0c0e0",fontSize:12,fontStyle:"italic",textDecoration:p.done?"line-through":"none"}}>{p.text}</span>
            <button onClick={()=>setPrayers(ps=>ps.filter(x=>x.id!==p.id))} style={{background:"none",border:"none",color:"#443355",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
        ))}
        {prayers.length===0&&<div style={{color:"#443355",fontSize:12,textAlign:"center",padding:16}}>Dil ki baat yahan likh saktein hain — poori privacy mein 🙏</div>}
      </div>
    </div>
  );
}

      <div style={{padding:"14px 16px 10px",background:"linear-gradient(180deg,rgba(212,160,184,0.08) 0%,transparent 100%)",borderBottom:"1px solid rgba(212,160,184,0.12)",position:"sticky",top:0,zIndex:10,backdropFilter:"blur(10px)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:C.rose,fontSize:17,fontWeight:700,letterSpacing:0.5}}>🌸 Dharma OS</div><div style={{color:"#554466",fontSize:10,letterSpacing:1}}>USHA JI · ROHINI · MITHUNA LAGNA</div></div>
          <div style={{textAlign:"right"}}><div style={{color:C.gold,fontSize:14,fontWeight:600}}>{today.timeStr}</div><div style={{color:"#554466",fontSize:10}}>{today.day}</div></div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px 0",WebkitOverflowScrolling:"touch"}}>
        {content[tab]}
        <div style={{height:24}}/>
      </div>
      <div style={{position:"sticky",bottom:0,zIndex:10}}>
        <TabBar active={tab} set={setTab}/>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
